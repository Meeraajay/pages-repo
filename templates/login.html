
<html>
<head>
    <title>Login Page</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body class="body2">

    <h2>Login Page</h2>

    <form method="POST" class="form2">
        {% csrf_token %}

        <input class="input2" type="text" name="username" placeholder="Enter Username" required>

        <input class="input2" type="password" name="password" placeholder="Enter Password" required>

        <button class="button2" type="submit">Submit</button>
    </form>

</body>
</html>
